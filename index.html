// Auto-detect content situation from text content and optional frame name
function detectSituation(text, frameName) {
  const t = (text||'').toLowerCase();
  const f = (frameName||'').toLowerCase();
  const combined = t + ' ' + f;

  const signals = [
    { situation:'Error messages', score:0, keywords:['error','failed','fail','couldn\'t','unable','went wrong','try again','retry','oops','problem','issue','timeout','expired','invalid','denied','rejected'], frameHints:['error','fail','alert','warning'] },
    { situation:'Empty states', score:0, keywords:['no data','nothing to','no results','no items','no transactions','get started','start trading','empty','not found','no activity','no history'], frameHints:['empty','blank','zero','no data','placeholder'] },
    { situation:'Success messages', score:0, keywords:['success','congrat','completed','confirmed','done','approved','verified','welcome','you\'ve','well done'], frameHints:['success','confirm','complete','done'] },
    { situation:'Push notifications', score:0, keywords:[], frameHints:['push','notification','notif','alert push'] },
    { situation:'Banners', score:0, keywords:[], frameHints:['banner','promo','announcement','ribbon'] },
    { situation:'Emails', score:0, keywords:['subject:','unsubscribe','view in browser','email preferences'], frameHints:['email','newsletter','mail'] },
    { situation:'Text messages (SMS)', score:0, keywords:['verification code','otp','sms'], frameHints:['sms','text message','otp'] },
    { situation:'Tooltips', score:0, keywords:[], frameHints:['tooltip','popover','hint','info tip'] },
    { situation:'Marketing content', score:0, keywords:['exclusive','limited time','sign up','join','unlock','discover','explore','earn','reward','bonus','offer','promotion','campaign'], frameHints:['marketing','promo','campaign','landing','hero','cta','onboard'] },
    { situation:'Headers & subheaders', score:0, keywords:[], frameHints:['header','hero','heading','title section'] },
    { situation:'UI references', score:0, keywords:['go to','select','navigate','open the','in the menu'], frameHints:['instruction','how to','guide','tutorial','help'] },
    { situation:'Enthusiastic expressions', score:0, keywords:['congrats!','awesome','amazing','great job','well done','you did it'], frameHints:[] },
  ];

  for (const s of signals) {
    for (const kw of s.keywords) { if (t.includes(kw)) s.score += 2; }
    for (const fh of s.frameHints) { if (f.includes(fh)) s.score += 5; } // frame name is strong signal
  }

  const best = signals.filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
  if (best.length > 0 && best[0].score >= 2) {
    const match = toneFramework.find(tf=>tf.situation===best[0].situation);
    return match || null;
  }
  return null;
}

// Run content analysis on extracted text with optional context
function analyzeExtractedText(text, context) {
  if (!text || !text.trim()) return { issues:[], score:null, detectedSituation:null, advice:[] };
  const frameName = context?.frameName || '';
  const segments = context?.textSegments || null; // [{text, source}] for location tracking
  const issues = [];

  // Helper: find which segment a matched string belongs to
  function findLocation(matchText) {
    if (!segments) return null;
    const mt = (matchText||'').trim().toLowerCase();
    for (const seg of segments) {
      if (seg.text.toLowerCase().includes(mt)) return seg.source;
    }
    return null;
  }

  // 1. General checker rules
  for (const rule of checkerRules) {
    const re = new RegExp(rule.re.source, rule.re.flags);
    let m;
    while ((m = re.exec(text)) !== null) {
      issues.push({ ...rule, matchText:m[0], index:m.index, location:findLocation(m[0]) });
    }
  }

  // 2. Long sentence check — split on newlines too so each extracted text node is checked individually
  text.split(/[.!?\n]+/).filter(s=>s.trim()).forEach(s => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 25) issues.push({ id:'long', name:'Long sentence', sev:'info', cat:'Readability', msg:`${wc} words. Aim for under 20 for a 5th grade level.`, sug:'Break into shorter sentences.', matchText:s.trim().substring(0,60)+(s.trim().length>60?'...':''), index:text.indexOf(s.trim()), location:findLocation(s.trim()) });
  });

  // 3. Auto-detect situation and run context-specific checks
  const detectedSituation = detectSituation(text, frameName);
  if (detectedSituation) {
    const sitName = detectedSituation.situation;
    const sitIssues = runSituationChecks(text, sitName);
    for (const si of sitIssues) {
      si.index = si.index || 0;
      issues.push(si);
    }
  }

  issues.sort((a,b)=>a.index-b.index);

  // 4. Context-aware scoring
  const ec = issues.filter(i=>i.sev==='error').length;
  const wc2 = issues.filter(i=>i.sev==='warning').length;
  const ic = issues.filter(i=>i.sev==='info').length;
  // Situation-specific issues weigh more (they're more relevant)
  const sitIssueCount = issues.filter(i=>i.cat==='Character limit'||i.cat==='Tone'||i.cat==='Terminology'||i.cat==='Formatting').length;
  const baseScore = 100 - ec*10 - wc2*5 - ic*2 - sitIssueCount*3;
  const score = Math.max(0, Math.min(100, baseScore));

  // 5. Build actionable advice based on detected context
  const advice = [];
  if (detectedSituation) {
    advice.push({ type:'context', msg:`Detected as: ${detectedSituation.situation}`, detail:detectedSituation.desc });
    advice.push({ type:'tones', msg:'Recommended tones', tones:detectedSituation.tones });
    // Add specific actionable tips
    if (detectedSituation.situation==='Error messages') {
      if (!/\b(refresh|retry|try again|check|contact|update|go to)\b/i.test(text)) advice.push({ type:'action', msg:'Add a recovery action', detail:'Tell the user what they can do next. Example: "Refresh the page" or "Check your connection."' });
      if (/\b(we|our)\s+(failed|couldn|could not|were unable)/i.test(text)) advice.push({ type:'action', msg:'Don\'t blame OKX', detail:'Rewrite to focus on the situation, not who caused it. Instead of "We couldn\'t load", try "Failed to load."' });
    }
    if (detectedSituation.situation==='Empty states') {
      if (!/\b(start|begin|try|add|create|explore|get started|learn|deposit|trade)\b/i.test(text)) advice.push({ type:'action', msg:'Add a call to action', detail:'Guide users on what to do. Example: "Start trading to see your history here."' });
    }
    if (detectedSituation.situation==='Marketing content') {
      if (!/\b(you|your)\b/i.test(text) && !/\b(we|our)\b/i.test(text)) advice.push({ type:'action', msg:'Use first or second person', detail:'Address the reader directly with "you/your" or use "we/our" for brand voice.' });
    }
    if (detectedSituation.situation==='Push notifications') {
      if (text.length > 200) advice.push({ type:'action', msg:'Shorten the message', detail:`Currently ${text.length} chars. Keep title under 50 and body under 150 characters.` });
    }
    if (detectedSituation.situation==='Banners') {
      if (text.length > 103) advice.push({ type:'action', msg:'Trim to 103 characters', detail:`Currently ${text.length} chars. Banners should be brief and catchy.` });
    }
    // Do/Don't reference
    advice.push({ type:'example', doEx:detectedSituation.doEx, dontEx:detectedSituation.dontEx });
  } else {
    // No situation detected — give general advice
    const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
    if (wordCount > 30) advice.push({ type:'action', msg:'Consider breaking this into shorter sections', detail:'OKX guidelines recommend keeping content scannable. Use headers, bullets, or shorter paragraphs.' });
  }

  return { issues, score, detectedSituation, advice };
}

// OCR a single image and return extracted text
async function ocrImage(dataUrl) {
  try {
    const result = await Tesseract.recognize(dataUrl, 'eng', { logger: ()=>{} });
    return result.data.text || '';
  } catch(e) {
    console.error('OCR failed:', e);
    return '';
  }
}

const FIGMA_PAT_KEY = 'figma-pat';
function loadFigmaPat(){ return localStorage.getItem(FIGMA_PAT_KEY)||'' }
function saveFigmaPat(t){ localStorage.setItem(FIGMA_PAT_KEY, t) }

function parseFigmaUrl(url) {
  const m = url.match(/figma\.com\/(?:file|design|proto|board)\/([a-zA-Z0-9]+)/);
  if (!m) return null;
  const fileKey = m[1];
  const nodeMatch = url.match(/node-id=([^&]+)/);
  const nodeId = nodeMatch ? decodeURIComponent(nodeMatch[1]).replace('-',':') : null;
  return { fileKey, nodeId };
}

// Patterns to skip: device chrome, keyboards, timestamps, long hashes, noise
const FIGMA_SKIP_PATTERNS = [
  /^[\d]{1,2}:\d{2}$/, // status bar time like "9:41"
  /^[A-Z]{2,4}$/, // keyboard keys like "ABC", "DEF", "GHI", "PQRS", "TUV", "MNO"
  /^[0-9]$/, // single digit keyboard numbers
  /^[\+\#\*]$/, // special keyboard chars
  /^(return|space|shift|delete|emoji|globe|dictation)$/i, // keyboard labels
  /^(Search|Siri|Aa|URL|\.com|Go)$/i, // common iOS keyboard/browser chrome
  /^[\u2800-\u28FF]+$/, // braille patterns (used in some UI)
  /^[A-Fa-f0-9]{20,}$/, // long hex hashes (blockchain addresses, etc)
  /^T[A-Za-z0-9]{30,}$/, // TRON-style addresses
  /^0x[A-Fa-f0-9]{10,}$/, // ETH addresses
  /^(bc1|tb1)[a-z0-9]{20,}$/i, // BTC addresses
  /^MN[O0]$/i, // dial pad "MNO" variant
  /^WXYZ$/i, // dial pad key
  /^\d{4,6}$/, // signal strength / IDs in status bar (e.g. "504125")
  /^(ETH|BTC|USDT|USDC|BNB|SOL|XRP|ADA|DOT|AVAX|MATIC|LTC|DOGE|SHIB|UNI|LINK)$/i, // lone ticker symbols (not meaningful as content)
];

function shouldSkipFigmaText(text) {
  const trimmed = text.trim();
  if (!trimmed) return true;
  if (trimmed.length <= 1 && /[^a-zA-Z0-9]/.test(trimmed)) return true; // single symbol
  return FIGMA_SKIP_PATTERNS.some(re => re.test(trimmed));
}

function extractTextFromFigmaNodes(node, parentName, nearestFrame) {
  const texts = [];
  // Skip invisible nodes
  if (node.visible === false) return texts;
  // Skip nodes with very low opacity
  if (node.opacity !== undefined && node.opacity < 0.01) return texts;

  // Detect and skip common device chrome containers by name
  const name = (node.name || '').toLowerCase();
  const chromeNames = ['status bar', 'statusbar', 'status-bar', 'keyboard', 'home indicator',
    'navigation bar', 'navbar', 'nav bar', 'system', 'notch', 'dynamic island',
    'safe area', 'tab bar', 'tabbar', 'bottom bar', 'top bar', 'device frame',
    'phone frame', 'iphone', 'android frame', 'mockup', 'dial pad', 'dialpad', 'numpad'];
  if (chromeNames.some(cn => name.includes(cn))) return texts;

  // Track nearest frame/component ancestor as the source location
  const frameTypes = ['FRAME', 'COMPONENT', 'COMPONENT_SET', 'SECTION'];
  const currentFrame = frameTypes.includes(node.type) ? node.name : nearestFrame;

  if (node.type === 'TEXT' && node.characters) {
    if (!shouldSkipFigmaText(node.characters)) {
      texts.push({ text: node.characters, source: currentFrame || parentName || 'Screen' });
    }
  }
  if (node.children) {
    for (const child of node.children) {
      texts.push(...extractTextFromFigmaNodes(child, node.name, currentFrame));
    }
  }
  return texts;
}

async function fetchFigmaFile(fileKey, nodeId, token) {
  let url = `https://api.figma.com/v1/files/${fileKey}`;
  if (nodeId) url += `?ids=${encodeURIComponent(nodeId)}&depth=10`;
  else url += '?depth=10';
  const res = await fetch(url, { headers: { 'X-Figma-Token': token } });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Figma API error (${res.status}): ${err}`);
  }
  return res.json();
}

async function fetchFigmaThumbnail(fileKey, nodeId, token) {
  if (!nodeId) return null;
  const url = `https://api.figma.com/v1/images/${fileKey}?ids=${encodeURIComponent(nodeId)}&format=png&scale=2`;
  try {
    const res = await fetch(url, { headers: { 'X-Figma-Token': token } });
    if (!res.ok) return null;
    const data = await res.json();
    const images = data.images || {};
    return Object.values(images)[0] || null;
  } catch { return null; }
}

function findNodeById(node, targetId) {
  if (node.id === targetId) return node;
  if (node.children) {
    for (const child of node.children) {
      const found = findNodeById(child, targetId);
      if (found) return found;
    }
  }
  return null;
}

// ── CONTENT CHECKER ──────────────────────────────────
function runChecks(text) {
  if (!text.trim()) return [];
  const issues = [];
  for (const rule of checkerRules) {
    const re = new RegExp(rule.re.source, rule.re.flags);
    let m;
    while ((m = re.exec(text)) !== null) {
      issues.push({ ...rule, matchText:m[0], index:m.index });
    }
  }
  // Long sentences
  text.split(/[.!?]+/).filter(s=>s.trim()).forEach(s => {
    const wc = s.trim().split(/\s+/).length;
    if (wc > 25) issues.push({ id:'long', name:'Long sentence', sev:'info', cat:'Readability', msg:`${wc} words. Aim for under 20 for a 5th grade level.`, sug:'Break into shorter sentences.', matchText:s.trim().substring(0,60)+(s.trim().length>60?'...':''), index:text.indexOf(s.trim()) });
  });
  return issues.sort((a,b)=>a.index-b.index);
}

const samples = [
  { label:'Error message', text:'We couldn\'t process your request. We\'re sorry for the inconvenience. Please click the button below to try again...', situation:'Error messages' },
  { label:'Marketing banner', text:'OKX is launching a new feature that will help you make money fast! Click here to see the details & get started. This offer is available in your country only.', situation:'Marketing content' },
  { label:'Empty state', text:'Nothing to display.', situation:'Empty states' },
  { label:'Push notification', text:'You\'re missing out big time! The market will move and will you be ready? Finish identity verification to get ready. Click the link to see your account status.', situation:'Push notifications' },
  { label:'Good example', text:'You\'ve made your first deposit. Go to Portfolio to see your balance.', situation:'Success messages' },
];

// Situation-specific content checks that run on top of the general checker rules
function runSituationChecks(text, situation) {
  if (!text.trim() || !situation) return [];
  const issues = [];
  const len = text.length;
  const wordCount = text.trim().split(/\s+/).filter(Boolean).length;

  if (situation === 'Push notifications') {
    // Split on first period/newline to guess title vs body
    const parts = text.split(/[.\n]/).filter(s=>s.trim());
    const title = parts[0] || '';
    const body = parts.slice(1).join('. ').trim();
    if (title.length > 50) issues.push({ id:'push-title', name:'Push title too long', sev:'warning', cat:'Character limit', msg:`Title is ${title.length} chars. Max recommended is 50.`, sug:'Shorten the title to under 50 characters.', matchText:title.substring(0,55)+'...' });
    if (body && body.length > 150) issues.push({ id:'push-body', name:'Push body too long', sev:'warning', cat:'Character limit', msg:`Body is ${body.length} chars. Max recommended is 150.`, sug:'Keep the body under 150 characters.', matchText:body.substring(0,55)+'...' });
    if (/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/u.test(text)) issues.push({ id:'push-emoji', name:'Emoji in push notification', sev:'warning', cat:'Tone', msg:'Avoid emoji in push notifications unless peer-reviewed.', sug:'Remove the emoji or get peer review.' });
  }

  if (situation === 'Banners') {
    if (len > 103) issues.push({ id:'banner-len', name:'Banner too long', sev:'warning', cat:'Character limit', msg:`Banner is ${len} chars. Max recommended is 103.`, sug:'Shorten to 103 characters or fewer.' });
  }

  if (situation === 'Text messages (SMS)') {
    if (len > 160) issues.push({ id:'sms-len', name:'SMS too long', sev:'warning', cat:'Character limit', msg:`Message is ${len} chars. Keep under 160.`, sug:'Shorten to 160 characters or fewer.' });
    if (/\bSMS\b/.test(text)) issues.push({ id:'sms-term', name:'"SMS" used', sev:'info', cat:'Terminology', msg:'Write "text message" not "SMS" \u2014 it\'s too technical.', sug:'Replace "SMS" with "text message".' });
  }

  if (situation === 'Emails') {
    const lines = text.split('\n').filter(s=>s.trim());
    if (lines[0] && lines[0].length > 50) issues.push({ id:'email-subject', name:'Subject line may be too long', sev:'info', cat:'Character limit', msg:`First line is ${lines[0].length} chars. Subject lines should be ~50 chars (5\u20137 words).`, sug:'Shorten to around 50 characters.' });
  }

  if (situation === 'Empty states') {
    if (wordCount < 5 && !/\b(start|begin|try|add|create|explore|get started|learn)\b/i.test(text)) issues.push({ id:'empty-no-action', name:'No actionable guidance', sev:'warning', cat:'Tone', msg:'Empty states should provide a reason AND a solution. Guide the user on what to do next.', sug:'Add a call to action or helpful next step.' });
  }

  if (situation === 'Error messages') {
    if (!/\b(refresh|retry|try again|check|contact|update|go to)\b/i.test(text)) issues.push({ id:'error-no-action', name:'No recovery action', sev:'warning', cat:'Tone', msg:'Error messages should tell users what they can do. Answer: What can the user do?', sug:'Add a recovery action like "Refresh the page" or "Try again".' });
    if (/\b(we failed|our fault|we couldn\'t|we were unable)\b/i.test(text)) issues.push({ id:'error-blame', name:'Blaming OKX', sev:'warning', cat:'Tone', msg:'Don\'t blame OKX. Focus on the situation and solution.', sug:'Rewrite to focus on the outcome, not who caused it.' });
  }

  if (situation === 'Success messages') {
    if (text.split('!').length - 1 > 1) issues.push({ id:'success-excl', name:'Too many exclamation points', sev:'info', cat:'Tone', msg:'Keep success messages concise. One exclamation is enough.', sug:'Use at most one exclamation point.' });
    if (wordCount > 20) issues.push({ id:'success-long', name:'Success message too long', sev:'info', cat:'Tone', msg:'Success confirmations should be short. Put extra info in a subheader.', sug:'Shorten to under 20 words.' });
  }

  if (situation === 'Headers & subheaders') {
    if (/[.!]$/.test(text.trim())) issues.push({ id:'header-period', name:'Period in header', sev:'warning', cat:'Punctuation', msg:'Headers should not end with a period or exclamation point.', sug:'Remove the trailing punctuation.' });
    if (text.trim().split(' ').every(w => w[0] && w[0] === w[0].toUpperCase() && w.length > 1 && !/^(BTC|ETH|USDT|OKX|API|CTA|USD|NFT|FAQ|UTC)$/.test(w))) {
      if (wordCount > 2) issues.push({ id:'header-titlecase', name:'Possible title case', sev:'info', cat:'Formatting', msg:'Use sentence case for headers, not title case.', sug:'Only capitalize the first word and proper nouns.' });
    }
  }

  if (situation === 'Marketing content') {
    if (/\bOKX (is|has|was|will)\b/.test(text)) issues.push({ id:'mkt-third-person', name:'Third-person brand reference', sev:'warning', cat:'Tone', msg:'Use first-person (we/our) in marketing, not "OKX is..."', sug:'Replace "OKX is" with "We\'re" or similar.' });
    if (/\b(make money|get rich|100%|guaranteed)\b/i.test(text)) issues.push({ id:'mkt-cliche', name:'Overselling or cliche', sev:'warning', cat:'Tone', msg:'Avoid cliches and overselling. Be catchy without over-promising.', sug:'Focus on specific, honest benefits.' });
  }

  if (situation === 'Tooltips') {
    if (wordCount > 30) issues.push({ id:'tooltip-long', name:'Tooltip too long', sev:'info', cat:'Tone', msg:'Tooltips should be brief and helpful. This is quite long.', sug:'Shorten to a concise explanation.' });
  }

  if (situation === 'Enthusiastic expressions') {
    if (/\b(congrats|awesome|amazing|you did it|great job|well done|way to go)\b/i.test(text)) issues.push({ id:'enthus-jargon', name:'Overly enthusiastic', sev:'info', cat:'Tone', msg:'We\'re a regulated financial business. Limit enthusiastic jargon.', sug:'Use a more measured tone like "Deposit complete" instead.' });
  }

  if (situation === 'UI references') {
    if (/[""\u201C\u201D]/.test(text)) issues.push({ id:'ui-quotes', name:'Quoted UI element', sev:'warning', cat:'Formatting', msg:'Don\'t use quotation marks around UI elements.', sug:'Remove quotes and match on-screen capitalization.' });
    if (/\b(button|tab|menu|dropdown|toggle|checkbox)\b/i.test(text)) issues.push({ id:'ui-names', name:'UI element name used', sev:'info', cat:'Formatting', msg:'Avoid naming UI elements (button, tab, menu). Just refer to the label.', sug:'Say "Select Trade" not "Select the Trade button".' });
    if (/\b(top left|top right|bottom left|bottom right|upper|lower|left side|right side)\b/i.test(text)) issues.push({ id:'ui-direction', name:'Directional language', sev:'info', cat:'Formatting', msg:'Avoid directional language like "top left" or "bottom menu".', sug:'Reference the element by its label instead.' });
  }

  return issues;
}

function ScreenLibrary() {
  const [screens, setScreens] = useState(loadScreens);
  const [sessions, setSessions] = useState(loadSessions);
  const [search, setSearch] = useState('');
  const [filterTag, setFilterTag] = useState(null);
  const [viewMode, setViewMode] = useState('grid');
  const [selected, setSelected] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [ocrQueue, setOcrQueue] = useState([]);
  const fileRef = useRef(null);

  // Input mode tabs
  const [inputTab, setInputTab] = useState('figma'); // 'figma' | 'upload'
  // Figma state
  const [figmaPat, setFigmaPat] = useState(loadFigmaPat);
  const [showPatInput, setShowPatInput] = useState(!loadFigmaPat());
  const [patVisible, setPatVisible] = useState(false);
  const [figmaUrl, setFigmaUrl] = useState('');
  const [figmaLoading, setFigmaLoading] = useState(false);
  const [figmaError, setFigmaError] = useState('');

  // Persist helper
  const updateScreenData = (id, updates) => {
    setScreens(prev => {
      const next = prev.map(s => s.id===id ? {...s,...updates} : s);
      saveScreens(next);
      return next;
    });
    if (selected?.id===id) setSelected(s => s ? {...s,...updates} : s);
  };

  // Run OCR + analysis on a single screen
  const analyzeScreen = useCallback(async (screen) => {
    setOcrQueue(q => [...q, screen.id]);
    updateScreenData(screen.id, { ocrStatus:'processing' });
    const extractedText = await ocrImage(screen.dataUrl);
    const { issues, score, detectedSituation, advice } = analyzeExtractedText(extractedText, { frameName:screen.name });
    const analysisData = { extractedText, analysis:issues, analysisScore:score, detectedSituation:detectedSituation?.situation||null, advice, analyzedAt:new Date().toISOString(), ocrStatus:'done' };
    setScreens(prev => {
      const next = prev.map(s => s.id===screen.id ? {...s,...analysisData} : s);
      saveScreens(next);
      return next;
    });
    setSelected(s => s?.id===screen.id ? {...s,...analysisData} : s);
    setOcrQueue(q => q.filter(qid => qid!==screen.id));
  }, []);

  // ── Figma scan ──
  const scanFigma = useCallback(async () => {
    setFigmaError('');
    const parsed = parseFigmaUrl(figmaUrl);
    if (!parsed) { setFigmaError('Invalid Figma URL. Paste a link like https://www.figma.com/design/FILE_KEY/...'); return; }
    if (!figmaPat) { setFigmaError('Please set your Figma token first.'); setShowPatInput(true); return; }

    setFigmaLoading(true);
    try {
      // 1. Fetch file data
      const data = await fetchFigmaFile(parsed.fileKey, parsed.nodeId, figmaPat);
      const fileName = data.name || 'Figma file';

      // 2. Find the target node and extract text
      let targetNode = data.document;
      let nodeName = fileName;
      if (parsed.nodeId) {
        const found = findNodeById(data.document, parsed.nodeId);
        if (found) { targetNode = found; nodeName = found.name || nodeName; }
      }
      const textParts = extractTextFromFigmaNodes(targetNode);
      // Deduplicate while preserving order
      const seen = new Set();
      const uniqueParts = textParts.filter(t => { const k = t.text.trim(); if (seen.has(k)) return false; seen.add(k); return true; });
      const extractedText = uniqueParts.map(t => t.text).join('\n');
      const textSegments = uniqueParts.map(t => ({ text:t.text.trim(), source:t.source }));

      // 3. Get thumbnail
      const thumbNodeId = parsed.nodeId || (data.document.children?.[0]?.id);
      let thumbnailUrl = data.thumbnailUrl || null;
      if (thumbNodeId) {
        const img = await fetchFigmaThumbnail(parsed.fileKey, thumbNodeId, figmaPat);
        if (img) thumbnailUrl = img;
      }

      // 4. Analyze with frame name context and segments for location tracking
      const { issues, score, detectedSituation, advice } = analyzeExtractedText(extractedText, { frameName:nodeName, textSegments });

      // 5. Create screen + session
      const screenId = Date.now()+'-'+Math.random().toString(36).substr(2,6);
      const sessionId = Date.now()+'-'+Math.random().toString(36).substr(2,6);
      const screen = {
        id:screenId, name:`${fileName} — ${nodeName}`, dataUrl:thumbnailUrl||'', tags:[], notes:'',
        createdAt:new Date().toISOString(), sessionId,
        extractedText, textSegments, analysis:issues, analysisScore:score, detectedSituation:detectedSituation?.situation||null, advice, analyzedAt:new Date().toISOString(),
        ocrStatus:'done', source:'figma', figmaUrl:figmaUrl
      };
      const session = { id:sessionId, createdAt:new Date().toISOString(), screenIds:[screenId], name:`Figma: ${nodeName}`, fileCount:1 };

      setScreens(prev => { const next=[screen,...prev]; saveScreens(next); return next; });
      setSessions(prev => { const next=[session,...prev]; saveSessions(next); return next; });
      setFigmaUrl('');
      setSelected(screen);
    } catch(e) {
      console.error('Figma scan failed:', e);
      if (e.message.includes('403')) setFigmaError('Access denied. Check that your token has file_content:read scope and you have access to this file.');
      else if (e.message.includes('404')) setFigmaError('File not found. Check the Figma URL is correct.');
      else if (e.message.includes('429')) setFigmaError('Rate limited by Figma. Wait a minute and try again.');
      else setFigmaError(`Failed to scan: ${e.message}`);
    } finally {
      setFigmaLoading(false);
    }
  }, [figmaUrl, figmaPat]);

  // Save PAT
  const handleSavePat = (val) => {
    setFigmaPat(val);
    saveFigmaPat(val);
    if (val) setShowPatInput(false);
  };

  const addScreens = useCallback(files => {
    const imageFiles = Array.from(files).filter(f=>f.type.startsWith('image/'));
    if (!imageFiles.length) return;
    let done = 0;
    const newItems = [];
    const sessionId = Date.now()+'-'+Math.random().toString(36).substr(2,6);
    imageFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const screen = {
          id:Date.now()+'-'+Math.random().toString(36).substr(2,6),
          name:file.name, dataUrl:e.target.result, tags:[], notes:'',
          createdAt:new Date().toISOString(), sessionId,
          extractedText:null, analysis:null, analysisScore:null, analyzedAt:null, ocrStatus:'pending',
          source:'upload'
        };
        newItems.push(screen);
        done++;
        if (done===imageFiles.length) {
          setScreens(prev => { const next=[...newItems,...prev]; saveScreens(next); return next; });
          const session = { id:sessionId, createdAt:new Date().toISOString(), screenIds:newItems.map(s=>s.id), name:`Upload ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}`, fileCount:newItems.length };
          setSessions(prev => { const next=[session,...prev]; saveSessions(next); return next; });
          newItems.forEach(s => {
            (async () => {
              setOcrQueue(q => [...q, s.id]);
              const extractedText = await ocrImage(s.dataUrl);
              const { issues, score, detectedSituation, advice } = analyzeExtractedText(extractedText, { frameName:s.name });
              const analysisData = { extractedText, analysis:issues, analysisScore:score, detectedSituation:detectedSituation?.situation||null, advice, analyzedAt:new Date().toISOString(), ocrStatus:'done' };
              setScreens(prev => { const next=prev.map(x => x.id===s.id ? {...x,...analysisData} : x); saveScreens(next); return next; });
              setSelected(sel => sel?.id===s.id ? {...sel,...analysisData} : sel);
              setOcrQueue(q => q.filter(qid => qid!==s.id));
            })();
          });
        }
      };
      reader.readAsDataURL(file);
    });
  },[]);

  const remove = id => {
    setScreens(prev=>{ const next=prev.filter(s=>s.id!==id); saveScreens(next); return next; });
    setSessions(prev => { const next=prev.map(ses=>({...ses,screenIds:ses.screenIds.filter(sid=>sid!==id)})).filter(ses=>ses.screenIds.length>0); saveSessions(next); return next; });
    if(selected?.id===id) setSelected(null);
  };

  const toggleTag = (sid,tag) => {
    setScreens(prev=>{ const next=prev.map(s=>{ if(s.id!==sid) return s; const tags=s.tags.includes(tag)?s.tags.filter(t=>t!==tag):[...s.tags,tag]; return {...s,tags}; }); saveScreens(next); return next; });
    if(selected?.id===sid) setSelected(s=>{ const tags=s.tags.includes(tag)?s.tags.filter(t=>t!==tag):[...s.tags,tag]; return {...s,tags}; });
  };

  const allTags = [...new Set(screens.flatMap(s=>s.tags))];
  const filtered = screens.filter(s => {
    const ms = !search || s.name.toLowerCase().includes(search.toLowerCase()) || (s.notes||'').toLowerCase().includes(search.toLowerCase()) || s.tags.some(t=>t.toLowerCase().includes(search.toLowerCase())) || (s.extractedText||'').toLowerCase().includes(search.toLowerCase());
    const mt = !filterTag || s.tags.includes(filterTag);
    return ms && mt;
  });

  const ScoreBadge = ({score, size='sm'}) => {
    if (score===null||score===undefined) return null;
    const color = score>=80?'bg-emerald-100 text-emerald-700':score>=60?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
    return <span className={`inline-flex items-center px-1.5 py-0 rounded-full font-medium ${color} ${size==='sm'?'text-[10px]':'text-xs'}`}>{score}</span>;
  };

  return (
    <div className="space-y-6">
      <div><h1 className="text-2xl font-bold">Screen library</h1><p className="text-surface-500 mt-1">Scan Figma designs or upload screenshots to check content against OKX guidelines.</p></div>

      {/* ── Input zone with tabs ── */}
      <div className="bg-white rounded-xl border border-surface-200 shadow-sm overflow-hidden">
        <div className="flex border-b border-surface-100">
          <button onClick={()=>setInputTab('figma')} className={`flex items-center gap-2 px-5 py-3 text-sm font-medium transition-colors border-b-2 ${inputTab==='figma'?'border-brand-600 text-brand-700 bg-brand-50/50':'border-transparent text-surface-500 hover:text-surface-700'}`}>
            <Icon name="figma" size={16}/> Figma link
          </button>
          <button onClick={()=>setInputTab('upload')} className={`flex items-center gap-2 px-5 py-3 text-sm font-medium transition-colors border-b-2 ${inputTab==='upload'?'border-brand-600 text-brand-700 bg-brand-50/50':'border-transparent text-surface-500 hover:text-surface-700'}`}>
            <Icon name="upload" size={16}/> Upload screenshots
          </button>
        </div>

        {/* Figma tab */}
        {inputTab==='figma' && (
          <div className="p-5 space-y-4">
            {/* PAT setup */}
            {showPatInput ? (
              <div className="rounded-lg border border-surface-200 bg-surface-50 p-4 space-y-3">
                <div className="flex items-center gap-2"><Icon name="settings" size={16} className="text-surface-500"/><h3 className="text-sm font-semibold text-surface-700">Connect to Figma</h3></div>
                <p className="text-xs text-surface-500">Generate a Personal Access Token in Figma: Settings &rarr; Security &rarr; Generate new token. Enable the <strong>file_content:read</strong> scope.</p>
                <div className="flex gap-2">
                  <div className="relative flex-1">
                    <input type={patVisible?'text':'password'} value={figmaPat} onChange={e=>setFigmaPat(e.target.value)} placeholder="figd_xxxxxxxxxxxx" className="w-full px-3 py-2 rounded-lg border border-surface-200 bg-white text-sm font-mono focus:outline-none focus:ring-2 focus:ring-brand-500 pr-9"/>
                    <button onClick={()=>setPatVisible(!patVisible)} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-surface-400 hover:text-surface-600"><Icon name={patVisible?'eyeOff':'eye'} size={14}/></button>
                  </div>
                  <button onClick={()=>handleSavePat(figmaPat)} disabled={!figmaPat.trim()} className="px-4 py-2 rounded-lg text-sm font-medium bg-brand-600 text-white hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed shrink-0">Save</button>
                </div>
              </div>
            ) : (
              <div className="flex items-center justify-between rounded-lg bg-emerald-50 border border-emerald-200 px-3 py-2">
                <div className="flex items-center gap-2"><Icon name="checkCircle" size={14} className="text-emerald-600"/><span className="text-xs font-medium text-emerald-700">Figma connected</span></div>
                <button onClick={()=>setShowPatInput(true)} className="text-xs text-emerald-600 hover:text-emerald-800 underline">Change token</button>
              </div>
            )}

            {/* URL input */}
            <div className="flex gap-2">
              <div className="relative flex-1">
                <Icon name="link" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-surface-400"/>
                <input type="text" value={figmaUrl} onChange={e=>{setFigmaUrl(e.target.value);setFigmaError('');}}
                  onKeyDown={e=>{if(e.key==='Enter'&&figmaUrl.trim()) scanFigma();}}
                  placeholder="Paste a Figma design link (e.g. figma.com/design/abc123/...)"
                  className="w-full px-4 py-3 rounded-lg border border-surface-200 bg-white placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-brand-500 pl-10 text-sm"/>
              </div>
              <button onClick={scanFigma} disabled={figmaLoading||!figmaUrl.trim()}
                className="px-5 py-3 rounded-lg text-sm font-medium bg-brand-600 text-white hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed shrink-0 flex items-center gap-2">
                {figmaLoading ? (<><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>Scanning...</>) : (<><Icon name="search" size={16}/>Scan</>)}
              </button>
            </div>
            {figmaError && <div className="flex items-start gap-2 p-3 rounded-lg bg-red-50 border border-red-200"><Icon name="alertCircle" size={14} className="text-red-500 mt-0.5 shrink-0"/><p className="text-xs text-red-700">{figmaError}</p></div>}
            <p className="text-xs text-surface-400">Tip: Include a <code className="bg-surface-100 px-1 rounded">?node-id=</code> in the URL to scan a specific frame. Text is extracted directly from Figma — no OCR needed.</p>
          </div>
        )}

        {/* Upload tab */}
        {inputTab==='upload' && (
          <div className="p-5">
            <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);if(e.dataTransfer.files?.length) addScreens(e.dataTransfer.files);}} onClick={()=>fileRef.current?.click()}
              className={`rounded-xl border-2 border-dashed p-8 text-center cursor-pointer transition-colors ${dragOver?'border-brand-500 bg-brand-50':'border-surface-200 hover:border-surface-300'}`}>
              <Icon name="upload" size={32} className={`mx-auto mb-3 ${dragOver?'text-brand-500':'text-surface-300'}`}/>
              <p className="text-sm font-medium text-surface-700">Drop screenshots here or select to upload</p>
              <p className="text-xs text-surface-400 mt-1">PNG, JPG, or WebP &mdash; text will be extracted via OCR and checked automatically</p>
              <input ref={fileRef} type="file" accept="image/*" multiple onChange={e=>{if(e.target.files?.length) addScreens(e.target.files); e.target.value='';}} className="hidden"/>
            </div>
          </div>
        )}
      </div>

      {/* Processing indicator */}
      {ocrQueue.length > 0 && (
        <div className="flex items-center gap-3 p-3 rounded-lg bg-brand-50 border border-brand-200">
          <div className="w-5 h-5 border-2 border-brand-600 border-t-transparent rounded-full animate-spin shrink-0"/>
          <p className="text-sm text-brand-800">Analyzing {ocrQueue.length} screen{ocrQueue.length!==1?'s':''}... Extracting text and checking against guidelines.</p>
        </div>
      )}

      {screens.length>0 && (<>
        {/* Toolbar */}
        <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
          <div className="relative flex-1 w-full"><Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-surface-400"/><input type="text" placeholder="Search by name, notes, tags, or extracted text..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-surface-200 bg-white placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-brand-500 pl-10 text-sm"/></div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setViewMode('grid')} className={`p-2 rounded-lg ${viewMode==='grid'?'bg-brand-100 text-brand-700':'text-surface-400 hover:text-surface-600'}`}><Icon name="grid" size={18}/></button>
            <button onClick={()=>setViewMode('list')} className={`p-2 rounded-lg ${viewMode==='list'?'bg-brand-100 text-brand-700':'text-surface-400 hover:text-surface-600'}`}><Icon name="list" size={18}/></button>
            <span className="text-sm text-surface-400 ml-2">{filtered.length} screen{filtered.length!==1?'s':''}</span>
          </div>
        </div>

        {/* Tag filters */}
        {allTags.length>0 && (
          <div className="flex flex-wrap gap-2 items-center">
            <Icon name="tag" size={14} className="text-surface-400"/>
            {allTags.map(tag=>(<button key={tag} onClick={()=>setFilterTag(filterTag===tag?null:tag)} className={`px-2.5 py-1 rounded-full text-xs font-medium ${filterTag===tag?'bg-brand-700 text-white':'bg-surface-100 text-surface-600 hover:bg-surface-200'}`}>{tag}</button>))}
            {filterTag && <button onClick={()=>setFilterTag(null)} className="text-xs text-surface-400 hover:text-surface-600 underline">Clear</button>}
          </div>
        )}

        {/* Grid/List view */}
        {viewMode==='grid' ? (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {filtered.map(s=>(
              <div key={s.id} className="bg-white rounded-xl border border-surface-200 shadow-sm overflow-hidden group cursor-pointer" onClick={()=>setSelected(s)}>
                <div className="relative aspect-[4/3] bg-surface-100">
                  {s.dataUrl ? <img src={s.dataUrl} alt={s.name} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center"><Icon name="figma" size={32} className="text-surface-300"/></div>}
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors flex items-center justify-center"><Icon name="zoom" size={24} className="text-white opacity-0 group-hover:opacity-100 transition-opacity"/></div>
                  <button onClick={e=>{e.stopPropagation();remove(s.id)}} className="absolute top-2 right-2 w-6 h-6 rounded-full bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-red-500"><Icon name="x" size={12}/></button>
                  {s.ocrStatus==='processing' && <div className="absolute top-2 left-2 px-2 py-0.5 rounded-full bg-brand-600 text-white text-[10px] font-medium flex items-center gap-1"><div className="w-2.5 h-2.5 border border-white border-t-transparent rounded-full animate-spin"/>Analyzing</div>}
                  {s.analysisScore!==null && s.analysisScore!==undefined && <div className="absolute top-2 left-2"><ScoreBadge score={s.analysisScore}/></div>}
                  {s.source==='figma' && <div className="absolute bottom-2 right-2 w-5 h-5 rounded bg-white/90 flex items-center justify-center" title="From Figma"><Icon name="figma" size={12} className="text-purple-600"/></div>}
                </div>
                <div className="p-3">
                  <p className="text-xs font-medium text-surface-700 truncate">{s.name}</p>
                  <div className="flex items-center gap-1.5 mt-1">
                    {s.analysis && <span className="text-[10px] text-surface-400">{s.analysis.length} issue{s.analysis.length!==1?'s':''}</span>}
                    {s.detectedSituation && <span className="text-[10px] text-indigo-600 font-medium">{s.detectedSituation}</span>}
                    {s.tags.length>0 && s.tags.slice(0,2).map(t=>(<span key={t} className="inline-flex items-center px-1.5 py-0 rounded-full text-[10px] font-medium bg-surface-100 text-surface-700">{t}</span>))}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="space-y-2">
            {filtered.map(s=>(
              <div key={s.id} className="bg-white rounded-xl border border-surface-200 shadow-sm flex items-center gap-4 p-3 cursor-pointer hover:shadow-md" onClick={()=>setSelected(s)}>
                <div className="w-16 h-12 rounded-lg overflow-hidden bg-surface-100 shrink-0">
                  {s.dataUrl ? <img src={s.dataUrl} alt={s.name} className="w-full h-full object-cover"/> : <div className="w-full h-full flex items-center justify-center"><Icon name="figma" size={20} className="text-surface-300"/></div>}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5">
                    {s.source==='figma' && <Icon name="figma" size={12} className="text-purple-600 shrink-0"/>}
                    <p className="text-sm font-medium truncate">{s.name}</p>
                  </div>
                  <div className="flex items-center gap-2 mt-0.5">
                    {s.ocrStatus==='processing' && <span className="text-[10px] text-brand-600 font-medium">Analyzing...</span>}
                    {s.analysis && <span className="text-xs text-surface-400">{s.analysis.length} issue{s.analysis.length!==1?'s':''}</span>}
                    <ScoreBadge score={s.analysisScore}/>
                  </div>
                </div>
                <div className="flex flex-wrap gap-1 shrink-0">{s.tags.map(t=>(<span key={t} className="inline-flex items-center px-1.5 py-0 rounded-full text-[10px] font-medium bg-surface-100 text-surface-700">{t}</span>))}</div>
                <button onClick={e=>{e.stopPropagation();remove(s.id)}} className="text-surface-300 hover:text-red-500 shrink-0"><Icon name="trash" size={14}/></button>
              </div>
            ))}
          </div>
        )}
      </>)}

      {screens.length===0 && (
        <div className="text-center py-16 text-surface-400"><Icon name="image" size={48} className="mx-auto mb-4 text-surface-200"/><p className="text-lg font-medium">No screens yet</p><p className="text-sm mt-1">Paste a Figma link above to scan, or upload screenshots.</p></div>
      )}

      {/* ── Detail modal with analysis ── */}
      {selected && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={()=>setSelected(null)}>
          <div className="bg-white rounded-2xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between p-4 border-b border-surface-100">
              <div className="flex items-center gap-3 min-w-0">
                {selected.source==='figma' && <Icon name="figma" size={16} className="text-purple-600 shrink-0"/>}
                <h3 className="font-semibold truncate">{selected.name}</h3>
                <ScoreBadge score={selected.analysisScore} size="md"/>
                {selected.detectedSituation && <span className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-indigo-100 text-indigo-700 border border-indigo-200 shrink-0">{selected.detectedSituation}</span>}
              </div>
              <button onClick={()=>setSelected(null)} className="text-surface-400 hover:text-surface-600 shrink-0"><Icon name="x" size={20}/></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4">
              <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                {/* Left: image */}
                <div className="lg:col-span-2">
                  <div className="bg-surface-100 rounded-xl overflow-hidden mb-4">
                    {selected.dataUrl ? <img src={selected.dataUrl} alt={selected.name} className="w-full h-auto"/> : <div className="aspect-[4/3] flex items-center justify-center"><Icon name="figma" size={48} className="text-surface-300"/></div>}
                  </div>
                  {/* Figma link */}
                  {selected.figmaUrl && (
                    <a href={selected.figmaUrl} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 px-3 py-2 rounded-lg bg-purple-50 border border-purple-200 text-xs text-purple-700 hover:bg-purple-100 transition-colors mb-4">
                      <Icon name="figma" size={12} className="shrink-0"/> Open in Figma &rarr;
                    </a>
                  )}
                  {/* Tags */}
                  <div className="mb-4"><label className="text-xs font-semibold uppercase tracking-wider text-surface-400 block mb-1.5">Tags</label>
                    <div className="flex flex-wrap gap-1.5">
                      {SUGGESTED_TAGS.map(tag=>{
                        const active = selected.tags.includes(tag);
                        return (<button key={tag} onClick={()=>toggleTag(selected.id,tag)} className={`px-2.5 py-1 rounded-full text-xs font-medium transition-colors ${active?'bg-brand-600 text-white':'bg-surface-100 text-surface-500 hover:bg-surface-200'}`}>{active&&'\u2713 '}{tag}</button>);
                      })}
                    </div>
                  </div>
                  {/* Notes */}
                  <div><label className="text-xs font-semibold uppercase tracking-wider text-surface-400 block mb-1.5">Notes</label>
                    <textarea value={selected.notes||''} onChange={e=>updateScreenData(selected.id,{notes:e.target.value})} placeholder="Add notes..." className="w-full px-3 py-2 rounded-lg border border-surface-200 bg-white placeholder:text-surface-400 focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm min-h-[60px] resize-y"/>
                  </div>
                  <p className="text-xs text-surface-400 mt-2">{selected.source==='figma'?'Scanned':'Uploaded'}: {new Date(selected.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}</p>
                </div>

                {/* Right: extracted text + analysis */}
                <div className="lg:col-span-3 space-y-4">
                  <div>
                    <div className="flex items-center justify-between mb-1.5">
                      <label className="text-xs font-semibold uppercase tracking-wider text-surface-400">Extracted text {selected.source==='figma' && <span className="text-purple-500 normal-case">(from Figma)</span>}</label>
                      {selected.source!=='figma' && (
                        <button onClick={()=>analyzeScreen(selected)} className="px-2.5 py-1 rounded-md text-xs bg-brand-50 text-brand-700 hover:bg-brand-100 font-medium transition-colors">
                          {selected.ocrStatus==='processing' ? 'Analyzing...' : 'Re-analyze'}
                        </button>
                      )}
                    </div>
                    {selected.ocrStatus==='processing' ? (
                      <div className="flex items-center gap-2 p-4 rounded-lg bg-surface-50 border border-surface-200">
                        <div className="w-4 h-4 border-2 border-brand-600 border-t-transparent rounded-full animate-spin"/>
                        <span className="text-sm text-surface-500">Extracting text from image...</span>
                      </div>
                    ) : selected.extractedText ? (
                      selected.textSegments && selected.textSegments.length > 0 ? (
                        <div className="space-y-1 max-h-[200px] overflow-y-auto pr-1">
                          {(() => {
                            // Group segments by source frame
                            const grouped = {};
                            selected.textSegments.forEach(seg => {
                              if (!grouped[seg.source]) grouped[seg.source] = [];
                              grouped[seg.source].push(seg.text);
                            });
                            return Object.entries(grouped).map(([source, texts], gi) => (
                              <div key={gi} className="rounded-lg border border-surface-200 bg-surface-50 p-2">
                                <div className="flex items-center gap-1.5 mb-1">
                                  <span className="text-[10px] font-semibold text-indigo-600 bg-indigo-50 px-1.5 py-0 rounded border border-indigo-200">{source}</span>
                                </div>
                                <p className="text-xs text-surface-700 leading-relaxed">{texts.join(' · ')}</p>
                              </div>
                            ));
                          })()}
                        </div>
                      ) : (
                        <textarea
                          value={selected.extractedText}
                          onChange={e => {
                            const newText = e.target.value;
                            const { issues, score, detectedSituation, advice } = analyzeExtractedText(newText, { frameName:selected.name });
                            updateScreenData(selected.id, { extractedText:newText, analysis:issues, analysisScore:score, detectedSituation:detectedSituation?.situation||null, advice });
                          }}
                          className="w-full px-3 py-2 rounded-lg border border-surface-200 bg-surface-50 text-sm font-mono leading-relaxed min-h-[80px] resize-y focus:outline-none focus:ring-2 focus:ring-brand-500"
                        />
                      )
                    ) : (
                      <div className="p-4 rounded-lg bg-surface-50 border border-surface-200 text-sm text-surface-400 text-center">
                        {selected.ocrStatus==='done' ? 'No text could be extracted.' : 'Text extraction pending.'}
                      </div>
                    )}
                    {selected.extractedText && !selected.textSegments && <p className="text-[10px] text-surface-400 mt-1">You can edit the text above to correct any issues. Analysis updates live.</p>}
                  </div>

                  {/* Analysis results */}
                  {selected.analysis && selected.analysis.length > 0 ? (
                    <div>
                      <div className="flex items-center justify-between mb-2">
                        <label className="text-xs font-semibold uppercase tracking-wider text-surface-400">
                          Content analysis ({selected.analysis.length} issue{selected.analysis.length!==1?'s':''})
                        </label>
                        <div className="flex items-center gap-3 text-[10px]">
                          <span className="text-red-600">{selected.analysis.filter(i=>i.sev==='error').length} errors</span>
                          <span className="text-amber-600">{selected.analysis.filter(i=>i.sev==='warning').length} warnings</span>
                          <span className="text-blue-600">{selected.analysis.filter(i=>i.sev==='info').length} suggestions</span>
                        </div>
                      </div>
                      <div className="space-y-2 max-h-[400px] overflow-y-auto pr-1">
                        {selected.analysis.map((issue,idx)=>{
                          const c = sevConfig[issue.sev];
                          return (
                            <div key={idx} className={`rounded-lg border p-2.5 ${c.bg} ${c.border}`}>
                              <div className="flex items-start gap-2">
                                <Icon name={c.icon} size={14} className={`${c.color} mt-0.5 shrink-0`}/>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-2 flex-wrap">
                                    <span className="text-xs font-medium">{issue.name}</span>
                                    <span className="text-[10px] text-surface-400">{issue.cat}</span>
                                    {issue.location && <span className="text-[10px] text-indigo-600 font-medium bg-indigo-50 px-1.5 py-0 rounded-full border border-indigo-200">📍 {issue.location}</span>}
                                  </div>
                                  <p className="text-xs text-surface-600 mt-0.5">{issue.msg}</p>
                                  {issue.matchText && <p className="text-[10px] font-mono text-surface-500 mt-1 bg-white/60 rounded px-1.5 py-0.5 inline-block">"{issue.matchText}"</p>}
                                  {issue.sug && <p className="text-[10px] text-surface-500 mt-0.5"><span className="font-medium">Fix:</span> {issue.sug}</p>}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ) : selected.analysis && selected.analysis.length===0 && selected.extractedText ? (
                    <div className="flex items-center gap-3 p-4 rounded-lg bg-emerald-50 border border-emerald-200">
                      <Icon name="checkCircle" size={20} className="text-emerald-600"/>
                      <div><p className="text-sm font-medium text-emerald-800">No issues found</p><p className="text-xs text-emerald-600">The content in this screen follows OKX guidelines.</p></div>
                    </div>
                  ) : null}

                  {/* Contextual advice panel */}
                  {selected.advice && selected.advice.length > 0 && (
                    <div>
                      <label className="text-xs font-semibold uppercase tracking-wider text-surface-400 mb-2 block">
                        Contextual advice
                      </label>
                      <div className="space-y-2">
                        {selected.advice.map((a,idx) => {
                          if (a.type==='context') return (
                            <div key={idx} className="rounded-lg border border-indigo-200 bg-indigo-50 p-3">
                              <div className="flex items-center gap-2 mb-1">
                                <span className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold bg-indigo-600 text-white">{a.msg.replace('Detected as: ','')}</span>
                              </div>
                              <p className="text-xs text-indigo-700">{a.detail}</p>
                            </div>
                          );
                          if (a.type==='tones') return (
                            <div key={idx} className="rounded-lg border border-surface-200 bg-surface-50 p-3">
                              <p className="text-[10px] font-semibold uppercase tracking-wider text-surface-400 mb-1.5">Recommended tones</p>
                              <div className="flex flex-wrap gap-1.5">
                                {a.tones.map((t,i) => <span key={i} className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-brand-100 text-brand-700 border border-brand-200">{t}</span>)}
                              </div>
                            </div>
                          );
                          if (a.type==='action') return (
                            <div key={idx} className="rounded-lg border border-amber-200 bg-amber-50 p-3">
                              <div className="flex items-start gap-2">
                                <Icon name="alertTriangle" size={14} className="text-amber-600 mt-0.5 shrink-0"/>
                                <div>
                                  <p className="text-xs font-medium text-amber-800">{a.msg}</p>
                                  <p className="text-xs text-amber-700 mt-0.5">{a.detail}</p>
                                </div>
                              </div>
                            </div>
                          );
                          if (a.type==='example') return (
                            <div key={idx} className="rounded-lg border border-surface-200 bg-surface-50 p-3">
                              <p className="text-[10px] font-semibold uppercase tracking-wider text-surface-400 mb-2">Reference examples</p>
                              <div className="grid grid-cols-2 gap-2">
                                <div className="rounded-md border border-emerald-200 bg-emerald-50 p-2">
                                  <p className="text-[10px] font-semibold text-emerald-700 mb-1 flex items-center gap-1"><Icon name="checkCircle" size={10}/>Do</p>
                                  <p className="text-[11px] text-emerald-800 italic">"{a.doEx}"</p>
                                </div>
                                <div className="rounded-md border border-red-200 bg-red-50 p-2">
                                  <p className="text-[10px] font-semibold text-red-700 mb-1 flex items-center gap-1"><Icon name="x" size={10}/>Don't</p>
                                  <p className="text-[11px] text-red-800 italic">"{a.dontEx}"</p>
                                </div>
                              </div>
                            </div>
                          );
                          return null;
                        })}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const pages = {
    dashboard: <Dashboard setPage={setPage}/>,
    guide: <StyleGuide/>,
    checker: <ContentChecker/>,
    tone: <ToneFramework/>,
    screens: <ScreenLibrary/>,
  };

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar page={page} setPage={setPage} open={sidebarOpen} setOpen={setSidebarOpen}/>
      <main className={`flex-1 overflow-y-auto transition-all duration-300 ${sidebarOpen?'ml-64':'ml-16'}`}>
        <div className="max-w-6xl mx-auto px-6 py-8">
          {pages[page] || pages.dashboard}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
